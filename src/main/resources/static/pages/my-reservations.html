<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Mes Réservations (Passager) - UniRide</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-contemporary">
    <header class="site-header" role="banner">
        <h1 class="logo" style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--color-primary)" />
                        <stop offset="100%" stop-color="var(--color-secondary)" />
                    </linearGradient>
                </defs>
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                <path d="M15 18H9"></path>
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path>
                <circle cx="17" cy="18" r="2"></circle>
                <circle cx="7" cy="18" r="2"></circle>
            </svg>
            UniRide
            </a>
        </h1>
        <nav class="site-nav" aria-label="Navigation principale">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/pages/search-trips.html" class="nav-link">Trajets</a>
            <a href="/pages/my-reservations.html" class="nav-link">Réservations</a>
            <a href="/pages/notifications.html" class="nav-link" aria-label="Notifications">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </a>
            <div id="auth-actions" class="auth-group">
                <a href="/pages/login.html" class="btn btn-secondary btn-sm">Connexion</a>
            </div>
            <div id="user-profile" class="user-profile hidden">
                <span class="user-greeting" id="user-greeting"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </nav>
    </header>


<main class="container">
  <header class="page-header">
    <h2 class="page-title">Mes Réservations</h2>
    <p class="text-lead text-muted">Suivez l'état de vos réservations et vos paiements.</p>
  </header>

  <div class="bento-container">
    <article class="bento-item span-12 span-md-12 span-lg-12">
        <div id="reservations" class="list"></div>
        <p id="status" class="status mt-3" role="status" aria-live="polite"></p>
    </article>
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
function statusClass(status) {
  if (status === "ACCEPTED") return "accepted";
  if (status === "PENDING") return "pending";
  return "rejected";
}

function statusLabel(status) {
  if (status === "ACCEPTED") return "Acceptee";
  if (status === "PENDING") return "En attente";
  if (status === "CANCELED") return "Refusee/Annulee";
  return status;
}

async function loadReservations() {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "PASSAGER");
    if (!user) return;
    const data = await API.request(`/reservations/passager/${user.userId}/suivi`);
    const box = document.getElementById("reservations");
    box.innerHTML = "";
    if (data.length === 0) {
      box.innerHTML = "<p class='text-muted small'>Aucune réservation existante.</p>";
      return;
    }
    data.forEach((r) => {
      const div = document.createElement("div");
      div.className = "card bento-item";
      div.style.padding = "var(--space-md)";
      const reservationLabel = r.reservationId ? r.reservationId.substring(0, 8) : "N/A";
      const canCancel = r.reservationStatus === "PENDING" || r.reservationStatus === "ACCEPTED";
      const contactHtml = r.canContactChauffeur
        ? `<p class="text-muted small" style="margin:6px 0 0 0;">Contact chauffeur: <strong>${r.chauffeurNom}</strong> - ${r.chauffeurEmail}</p>
          <div class="form-actions" style="margin-top:6px;"><button class="btn btn-secondary btn-sm" data-copy-email="${r.chauffeurEmail}">Copier email chauffeur</button></div>`
        : "<p class='text-muted small' style='margin:6px 0 0 0;'>Le contact chauffeur sera visible apres acceptation.</p>";
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
          <h4 style="margin:0;">Reservation #${reservationLabel}...</h4>
          <span class="status ${statusClass(r.reservationStatus)}">${statusLabel(r.reservationStatus)}</span>
        </div>
        <p class="text-muted small" style="margin:0;">Trajet: <strong>${r.depart} -> ${r.arrivee}</strong></p>
        <p class="text-muted small" style="margin:0;">Paiement: <strong>${r.paymentStatus || "AUTHORIZED"}</strong></p>
        ${contactHtml}
        <div class="form-actions mt-3">
          ${canCancel ? `<button class="btn btn-secondary btn-sm" style="color:var(--color-danger);" data-res-id="${r.reservationId}">Annuler la reservation</button>` : ""}
        </div>`;
      const cancelBtn = div.querySelector("button[data-res-id]");
      const copyBtn = div.querySelector("button[data-copy-email]");
      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => cancelReservation(r.reservationId));
      }
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          await navigator.clipboard.writeText(r.chauffeurEmail);
          showStatus("status", "Email chauffeur copie.");
        });
      }
      box.appendChild(div);
    });
  }, "status");
}

async function cancelReservation(resId) {
  if (!confirm("Voulez-vous annuler cette reservation ?")) return;
  await safeCall(async () => {
    const user = requireCurrentUser("status", "PASSAGER");
    if (!user) return;
    await API.request(`/reservations/${resId}/cancel?initiateurId=${user.userId}&initiateurChauffeur=false`, "POST");
    showStatus("status", "Reservation annulee.");
    await loadReservations();
  }, "status");
}

document.addEventListener("DOMContentLoaded", () => {
  loadReservations();
});
</script>
</body>
</html>
