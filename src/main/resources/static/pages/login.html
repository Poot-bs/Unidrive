<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Connexion - UniRide</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-contemporary">
    <header class="site-header" role="banner">
        <h1 class="logo" style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--color-primary)" />
                        <stop offset="100%" stop-color="var(--color-secondary)" />
                    </linearGradient>
                </defs>
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                <path d="M15 18H9"></path>
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path>
                <circle cx="17" cy="18" r="2"></circle>
                <circle cx="7" cy="18" r="2"></circle>
            </svg>
            UniRide
            </a>
        </h1>
        <nav class="site-nav" aria-label="Navigation principale">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/pages/search-trips.html" class="nav-link">Trajets</a>
            <a href="/pages/my-reservations.html" class="nav-link">Réservations</a>
            <a href="/pages/notifications.html" class="nav-link" aria-label="Notifications">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </a>
            <div id="auth-actions" class="auth-group">
                <a href="/pages/login.html" class="btn btn-secondary btn-sm">Connexion</a>
            </div>
            <div id="user-profile" class="user-profile hidden">
                <span class="user-greeting" id="user-greeting"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </nav>
    </header>


<main class="container">
  <article class="bento-item span-12 span-md-6" style="max-width:480px; margin: 2rem auto;">
    <div style="text-align:center; margin-bottom:var(--space-md);">
        <h2 class="display-title" style="font-size:2.25rem;">Bon retour !</h2>
        <p class="text-muted text-lead">Connectez-vous pour rechercher et réserver.</p>
    </div>
    <form onsubmit="loginUser(event)" class="form-grid" style="grid-template-columns: 1fr;">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" autocomplete="email" placeholder="nom@universite.edu" required>
      </div>
      <div class="form-group" style="margin-bottom:var(--space-lg);">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Se connecter</button>
    </form>
    <div class="text-center mt-3">
        <p class="small text-muted">Pas encore de compte ? <a href="/pages/register.html" style="color:var(--color-primary); font-weight:600; text-decoration:none;">S'inscrire</a></p>
    </div>
    <p id="status" class="status mt-3 text-center" style="display:block;" role="status" aria-live="polite"></p>
  </article>
</main>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
