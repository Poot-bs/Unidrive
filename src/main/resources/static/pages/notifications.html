<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Notifications - UniRide</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

    <header class="site-header" role="banner">
        <h1 class="logo" style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--color-primary)" />
                        <stop offset="100%" stop-color="var(--color-secondary)" />
                    </linearGradient>
                </defs>
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                <path d="M15 18H9"></path>
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path>
                <circle cx="17" cy="18" r="2"></circle>
                <circle cx="7" cy="18" r="2"></circle>
            </svg>
            UniRide
            </a>
        </h1>
        <nav class="site-nav" aria-label="Navigation principale">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/pages/search-trips.html" class="nav-link">Trajets</a>
            <a href="/pages/my-reservations.html" class="nav-link">Réservations</a>
            <a href="/pages/notifications.html" class="nav-link" aria-label="Notifications">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </a>
            <div id="auth-actions" class="auth-group">
                <a href="/pages/login.html" class="btn btn-secondary btn-sm">Connexion</a>
            </div>
            <div id="user-profile" class="user-profile hidden">
                <span class="user-greeting" id="user-greeting"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </nav>
    </header>


<main class="container">
  <header class="page-header">
    <h2 class="page-title">Mes Notifications</h2>
    <p class="text-lead text-muted">Retrouvez toutes les alertes de votre compte.</p>
  </header>

  <div class="bento-container">
    <article class="bento-item span-12 span-md-10" style="margin: 0 auto; width:100%;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary btn-sm" onclick="loadNotifications()">Rafraîchir</button>
                <button class="btn btn-secondary btn-sm" onclick="markAllRead()" style="color:var(--color-primary);">Tout lire</button>
            </div>
        </div>
        <div id="notifications" class="list"></div>
        <p id="status" class="status mt-3 text-center" role="status" aria-live="polite"></p>
    </article>
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
let readNotifications = new Set(JSON.parse(localStorage.getItem("readNotifications") || "[]"));

function persistReadNotifications() {
  localStorage.setItem("readNotifications", JSON.stringify(Array.from(readNotifications)));
}

async function loadNotifications() {
  await safeCall(async () => {
    const user = requireCurrentUser("status");
    if (!user) return;
    const data = await API.request(`/users/${user.userId}/notifications`);
    const box = document.getElementById("notifications");
    box.innerHTML = "";
    if (data.length === 0) {
      box.innerHTML = "<p class='text-muted small'>Aucune notification existante.</p>";
      return;
    }
    data.forEach((n) => {
      const div = document.createElement("div");
      div.className = "card bento-item";
      div.style.padding = "var(--space-sm) var(--space-md)";
      const isRead = readNotifications.has(n.id);
      div.style.opacity = isRead ? "0.6" : "1";
      const dateStr = n.createdAt ? new Date(n.createdAt).toLocaleString() : "";
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h4 style="margin:0; font-size:1.05rem;">Notification ${n.channel || "SYSTEM"}</h4>
          <span class="small text-muted">${dateStr}</span>
        </div>
        <p class="text-muted small" style="margin:8px 0 0 0;">${n.message || ""}</p>`;
      if (!isRead) {
        const btn = document.createElement("button");
        btn.className = "btn btn-primary btn-sm";
        btn.style.marginTop = "12px";
        btn.textContent = "Marquer comme lu";
        btn.addEventListener("click", () => markRead(n.id));
        div.appendChild(btn);
      }
      box.appendChild(div);
    });
  }, "status");
}

async function markRead(notifId) {
  readNotifications.add(notifId);
  persistReadNotifications();
  await loadNotifications();
}

async function markAllRead() {
  const user = requireCurrentUser("status");
  if (!user) return;
  const data = await API.request(`/users/${user.userId}/notifications`);
  data.forEach((n) => readNotifications.add(n.id));
  persistReadNotifications();
  await loadNotifications();
}

document.addEventListener("DOMContentLoaded", () => {
  loadNotifications();
});
</script>
</body>
</html>
