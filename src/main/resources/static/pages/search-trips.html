<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Recherche Trajets - UniRide</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-contemporary">
    <header class="site-header" role="banner">
        <h1 class="logo" style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--color-primary)" />
                        <stop offset="100%" stop-color="var(--color-secondary)" />
                    </linearGradient>
                </defs>
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                <path d="M15 18H9"></path>
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path>
                <circle cx="17" cy="18" r="2"></circle>
                <circle cx="7" cy="18" r="2"></circle>
            </svg>
            UniRide
            </a>
        </h1>
        <nav class="site-nav" aria-label="Navigation principale">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/pages/search-trips.html" class="nav-link">Trajets</a>
            <a href="/pages/my-reservations.html" class="nav-link">Réservations</a>
            <a href="/pages/notifications.html" class="nav-link" aria-label="Notifications">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </a>
            <div id="auth-actions" class="auth-group">
                <a href="/pages/login.html" class="btn btn-secondary btn-sm">Connexion</a>
            </div>
            <div id="user-profile" class="user-profile hidden">
                <span class="user-greeting" id="user-greeting"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </nav>
    </header>


<main class="container">
  <header class="page-header">
    <h2 class="page-title">Rechercher un trajet</h2>
    <p class="text-lead text-muted">Trouvez votre prochain trajet et réservez votre place.</p>
  </header>

  <div class="bento-container">
      
    <!-- Sidebar: User Info / Payment -->
    <aside class="bento-item span-12 span-md-4 span-lg-4" style="height: fit-content;">
      <div class="card-header">
          <div class="icon-wrapper">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
          </div>
          <h3>Mon Portefeuille</h3>
      </div>
      <p class="small text-muted mb-4">Gérez vos moyens de paiement avant de réserver.</p>
      
      <div class="form-grid" style="grid-template-columns: 1fr;">
        <div class="form-group hidden">
          <label for="passagerId">Passager ID</label>
          <input id="passagerId" readonly>
        </div>
        <div class="form-group">
          <label for="holderName">Nom sur la carte</label>
          <input id="holderName" placeholder="Ex: Jean Dupont">
        </div>
        <div class="form-group">
          <label for="cardLast4">4 derniers chiffres (Test)</label>
          <input id="cardLast4" maxlength="4" placeholder="1234">
        </div>
        <div class="form-group">
          <label for="paymentType">Type</label>
          <select id="paymentType">
            <option value="CARD">Carte Bancaire</option>
            <option value="WALLET">Portefeuille Numérique</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary btn-sm" onclick="loadPaymentMethods()">Actualiser</button>
          <button class="btn btn-primary btn-sm" onclick="addPaymentMethod()">Ajouter</button>
        </div>
      </div>
      <div id="paymentStatus" class="status mt-3" role="status" aria-live="polite"></div>
    </aside>

    <!-- Main Content: Search & Results -->
    <article class="bento-item span-12 span-md-8 span-lg-8">
      <h3>Critères de recherche</h3>
      <div class="form-grid mt-3">
        <div class="form-group">
          <label for="depart">Ville de départ</label>
          <input id="depart" placeholder="D'où partez-vous ?">
        </div>
        <div class="form-group">
          <label for="arrivee">Ville d'arrivée</label>
          <input id="arrivee" placeholder="Où allez-vous ?">
        </div>
        <div class="form-group">
          <label for="prixMax">Prix maximum (€)</label>
          <input id="prixMax" type="number" step="0.5" placeholder="Ex: 25">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="searchTrips()">Rechercher des trajets</button>
      </div>
      <div id="status" class="status mt-3" role="status" aria-live="polite"></div>

      <hr style="border:0; border-top:1px solid var(--color-border); margin: var(--space-lg) 0;" />

      <h3 style="margin-bottom:var(--space-md);">Résultats</h3>
      <div id="trips" class="list">
          <!-- Trips will go here -->
      </div>
    </article>

  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
let paymentMethods = [];

function getSelectedPaymentId() {
  return paymentMethods.length > 0 ? paymentMethods[0].id : "";
}

async function loadPaymentMethods() {
  await safeCall(async () => {
    const user = requireCurrentUser("paymentStatus", "PASSAGER");
    if (!user) return;
    document.getElementById("passagerId").value = user.userId;
    paymentMethods = await API.request(`/users/${user.userId}/payment-methods`);
    const ids = paymentMethods.map((m) => (m.cardLast4 ? `**** ${m.cardLast4}` : m.id)).join(", ");
    showStatus(
      "paymentStatus",
      paymentMethods.length > 0
        ? `Cartes disponibles: ${ids}`
        : "Aucun moyen de paiement. Ajoutez-en un pour reserver."
    );
  }, "paymentStatus");
}

async function addPaymentMethod() {
  await safeCall(async () => {
    const user = requireCurrentUser("paymentStatus", "PASSAGER");
    if (!user) return;
    const payload = {
      passagerId: user.userId,
      holderName: document.getElementById("holderName").value,
      type: document.getElementById("paymentType").value,
      cardLast4: document.getElementById("cardLast4").value,
    };
    await API.request("/users/payment-methods", "POST", payload);
    showStatus("paymentStatus", "Moyen ajoute avec succes.");
    await loadPaymentMethods();
  }, "paymentStatus");
}

async function searchTrips() {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "PASSAGER");
    if (!user) return;
    const params = new URLSearchParams();
    if (document.getElementById("depart").value) params.set("depart", document.getElementById("depart").value);
    if (document.getElementById("arrivee").value) params.set("arrivee", document.getElementById("arrivee").value);
    if (document.getElementById("prixMax").value) params.set("prixMax", document.getElementById("prixMax").value);
    const query = params.toString();
    const data = await API.request(`/trajets${query ? `?${query}` : ""}`);
    const box = document.getElementById("trips");
    box.innerHTML = "";
    if (data.length === 0) {
        box.innerHTML = "<p class='text-muted small'>Aucun trajet trouvé pour ces critères.</p>";
        return;
    }
    data.forEach((t) => {
      const div = document.createElement("div");
      div.className = "card bento-item";
      div.style.padding = "var(--space-md)";
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
          <h4 style="margin:0; font-size:1.15rem;">${t.depart} &rarr; ${t.arrivee}</h4>
          <span class="badge badge-primary">${t.etat}</span>
        </div>
        <p class="text-muted small" style="margin:0 0 16px 0;">
          Prix: <strong>${t.prixParPlace} EUR</strong> | Places dispo: <strong>${t.placesDisponibles}</strong>
        </p>
        <div class="form-actions" style="margin-top:auto;">
          <button class="btn btn-primary btn-sm" data-trip-id="${t.id}">Reserver ma place</button>
        </div>`;
      div.querySelector("button[data-trip-id]").addEventListener("click", () => bookTrip(t.id));
      box.appendChild(div);
    });
  }, "status");
}

async function bookTrip(trajetId) {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "PASSAGER");
    if (!user) return;
    if (paymentMethods.length === 0) {
      await loadPaymentMethods();
    }
    const moyenPaiementId = getSelectedPaymentId();
    if (!moyenPaiementId) {
      showStatus("status", "Ajoutez un moyen de paiement (Portefeuille) avant de réserver.", true);
      return;
    }
    const payload = { trajetId, passagerId: user.userId, moyenPaiementId };
    const r = await API.request("/reservations", "POST", payload);
    showStatus("status", "Réservation confirmée ! ID: " + r.id);
  }, "status");
}

document.addEventListener("DOMContentLoaded", () => {
  const user = requireCurrentUser("status", "PASSAGER");
  if (!user) return;
    loadPaymentMethods();
    searchTrips();
});
</script>
</body>
</html>
