<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Mes Trajets & Réservations - Chauffeur - UniRide</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-contemporary">
    <header class="site-header" role="banner">
        <h1 class="logo" style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <defs>
                    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--color-primary)" />
                        <stop offset="100%" stop-color="var(--color-secondary)" />
                    </linearGradient>
                </defs>
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                <path d="M15 18H9"></path>
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path>
                <circle cx="17" cy="18" r="2"></circle>
                <circle cx="7" cy="18" r="2"></circle>
            </svg>
            UniRide
            </a>
        </h1>
        <nav class="site-nav" aria-label="Navigation principale">
            <a href="/" class="nav-link">Accueil</a>
          <a href="/pages/create-trip.html" class="nav-link">Mes trajets</a>
          <a href="/pages/driver-reservations.html" class="nav-link">Demandes</a>
            <a href="/pages/notifications.html" class="nav-link" aria-label="Notifications">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </a>
            <div id="auth-actions" class="auth-group">
                <a href="/pages/login.html" class="btn btn-secondary btn-sm">Connexion</a>
            </div>
            <div id="user-profile" class="user-profile hidden">
                <span class="user-greeting" id="user-greeting"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
            </div>
        </nav>
    </header>


<main class="container">
  <header class="page-header">
    <h2 class="page-title">Mes Trajets (Chauffeur)</h2>
    <p class="text-lead text-muted">Consultez les demandes, acceptez/refusez, puis contactez directement vos passagers.</p>
  </header>

  <div class="bento-container">
    <article class="bento-item span-12 span-md-12 span-lg-12">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-md);">
            <h3>Demandes de reservation</h3>
            <div style="display:flex; gap:8px; align-items:center;">
              <select id="statusFilter" onchange="loadDriverTrips()">
                <option value="ALL">Toutes</option>
                <option value="PENDING">En attente</option>
                <option value="ACCEPTED">Acceptees</option>
                <option value="CANCELED">Annulees</option>
                <option value="REFUNDED_FULL">Remboursees (100%)</option>
                <option value="REFUNDED_PARTIAL">Remboursees (50%)</option>
                <option value="PENALIZED">Penalisees</option>
              </select>
              <span id="pendingBadge" class="badge badge-primary">0 en attente</span>
              <button class="btn btn-secondary btn-sm" onclick="loadDriverTrips()">Rafraîchir</button>
            </div>
        </div>
        <div id="trips" class="list"></div>
        <p id="status" class="status mt-3" role="status" aria-live="polite"></p>
    </article>
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
<script>
function statusClass(status) {
  if (status === "ACCEPTED") return "accepted";
  if (status === "PENDING") return "pending";
  return "rejected";
}

function statusLabel(status) {
  if (status === "ACCEPTED") return "Acceptee";
  if (status === "PENDING") return "En attente";
  if (status === "CANCELED") return "Refusee/Annulee";
  if (status === "REFUNDED_FULL") return "Remboursee (100%)";
  if (status === "REFUNDED_PARTIAL") return "Remboursee (50%)";
  if (status === "PENALIZED") return "Penalisee";
  return status;
}

async function loadDriverTrips() {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "CHAUFFEUR");
    if (!user) return;
    const data = await API.request(`/reservations/chauffeur/${user.userId}/demandes`);
    const selected = document.getElementById("statusFilter").value;
    const filtered = selected === "ALL" ? data : data.filter((d) => d.reservationStatus === selected);
    const box = document.getElementById("trips");
    box.innerHTML = "";
    if (filtered.length === 0) {
      document.getElementById("pendingBadge").textContent = "0 en attente";
      box.innerHTML = "<p class='text-muted small'>Aucune demande de reservation pour le moment.</p>";
      return;
    }
    const pendingCount = data.filter((d) => d.reservationStatus === "PENDING").length;
    document.getElementById("pendingBadge").textContent = `${pendingCount} en attente`;
    filtered.forEach((d) => {
      const div = document.createElement("div");
      div.className = "card bento-item";
      div.style.padding = "var(--space-md)";
      const canDecide = d.reservationStatus === "PENDING";
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <h4 style="margin:0;">Demande #${d.reservationId.substring(0, 8)}...</h4>
          <span class="status ${statusClass(d.reservationStatus)}">${statusLabel(d.reservationStatus)}</span>
        </div>
        <p class="text-muted small" style="margin:6px 0 0 0;">Trajet: <strong>${d.depart} -> ${d.arrivee}</strong> (${new Date(d.dateDepart).toLocaleString()})</p>
        <p class="text-muted small" style="margin:6px 0 0 0;">Passager: <strong>${d.passagerNom}</strong> - ${d.passagerEmail}</p>
        <p class="text-muted small" style="margin:6px 0 0 0;">Paiement: <strong>${d.paymentStatus}</strong></p>
        <div class="form-actions" style="margin-top:10px;">
          <button class="btn btn-secondary btn-sm" data-copy-email="${d.passagerEmail}">Copier email</button>
          ${canDecide ? `<button class="btn btn-primary btn-sm" data-accept-id="${d.reservationId}">Accepter</button>
          <button class="btn btn-secondary btn-sm" style="color:var(--color-danger);" data-reject-id="${d.reservationId}">Refuser</button>` : ""}
        </div>`;
      box.appendChild(div);

      const copyBtn = div.querySelector("button[data-copy-email]");
      const acceptBtn = div.querySelector("button[data-accept-id]");
      const rejectBtn = div.querySelector("button[data-reject-id]");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          await navigator.clipboard.writeText(d.passagerEmail);
          showStatus("status", "Email passager copie.");
        });
      }
      if (acceptBtn) {
        acceptBtn.addEventListener("click", () => confirmReservation(d.reservationId));
      }
      if (rejectBtn) {
        rejectBtn.addEventListener("click", () => rejectReservation(d.reservationId));
      }
    });
  }, "status");
}

async function confirmReservation(resId) {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "CHAUFFEUR");
    if (!user) return;
    await API.request(`/reservations/${resId}/confirm?chauffeurId=${user.userId}`, "POST");
    showStatus("status", "Reservation acceptee. Contact passager visible dans la liste.");
    await loadDriverTrips();
  }, "status");
}

async function rejectReservation(resId) {
  await safeCall(async () => {
    const user = requireCurrentUser("status", "CHAUFFEUR");
    if (!user) return;
    await API.request(`/reservations/${resId}/cancel?initiateurId=${user.userId}&initiateurChauffeur=true`, "POST");
    showStatus("status", "Reservation refusee.");
    await loadDriverTrips();
  }, "status");
}

document.addEventListener("DOMContentLoaded", () => {
  loadDriverTrips();
  setInterval(loadDriverTrips, 10000);
});
</script>
</body>
</html>
